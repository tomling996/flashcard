<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anki Flashcard 系統</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入 ES Module 邏輯代碼 -->
    <script type="module" src="app.js" defer></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="header-container">
                <h1>Anki Flashcard 學習網</h1>
                <div id="auth-section">
                    <button id="login-btn" class="btn btn-light">Google 帳號登入</button>
                    <div id="user-info" class="hidden">
                        <span id="user-name"></span>
                        <button id="logout-btn" class="btn btn-danger">登出</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- 未登入提示 -->
        <div id="welcome-message" class="welcome-box">
            <h2>歡迎來到 Anki Flashcard 學習系統 📚</h2>
            <p>請先使用 Google 帳號登入，以查看您的專屬字卡或建立全新的學習字卡！</p>
        </div>

        <!-- 登入後才會顯示的主畫面 -->
        <main id="main-content" class="hidden">
            <div class="grid-container">
                <!-- 左側控制面板：新增字卡 -->
                <aside class="controls">
                    <div class="card-box">
                        <h2 id="form-title">新增 Flashcard (字卡)</h2>
                        <form id="add-card-form">
                            <!-- 隱藏的編輯欄位，用來追蹤目前是否處於修改狀態 -->
                            <input type="hidden" id="edit-card-id">
                            
                            <div class="form-group">
                                <label for="front-input">卡片正面 (問題)</label>
                                <textarea id="front-input" placeholder="例如：CPU 是什麼的縮寫？" required rows="3"></textarea>
                            </div>
                            
                            <div class="form-group">
                                <label for="back-input">卡片背面 (答案/解釋)</label>
                                <textarea id="back-input" placeholder="例如：Central Processing Unit (中央處理器)" required rows="3"></textarea>
                            </div>
                            
                            <div class="checkbox-container">
                                <label class="switch">
                                    <input type="checkbox" id="public-checkbox">
                                    <span class="slider round"></span>
                                </label>
                                <span class="checkbox-label">共享此卡片 (全班同學皆可觀看)</span>
                            </div>
                            
                            <button type="submit" id="submit-btn" class="btn btn-primary">新增卡片</button>
                            <button type="button" id="cancel-edit-btn" class="btn btn-secondary hidden">取消編輯</button>
                        </form>
                    </div>
                </aside>

                <!-- 右側卡片展示區 -->
                <section class="display-area">
                    <div class="filters">
                        <button id="show-my-cards" class="tab-btn active">我的個人字卡</button>
                        <button id="show-public-cards" class="tab-btn">公共共享字卡 (老師/同學分享)</button>
                    </div>

                    <div id="flashcards-container" class="cards-grid">
                        <!-- 卡片將由 app.js 動態渲染至此 -->
                    </div>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
